<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footprint Finder | GOD LEVEL OSINT</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-layer-group logo-icon"></i>
                <h2>Footprint<span class="text-glow">Finder</span></h2>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}"><i class="fa-solid fa-satellite-dish"></i> Main Hub</a></li>
                <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}"><i class="fa-solid fa-terminal"></i> Terminal</a></li>
                <li><a href="{{ url_for('reports') }}" class="{% if request.endpoint == 'reports' %}active{% endif %}"><i class="fa-solid fa-vault"></i> Databank</a></li>
                <li><a href="{{ url_for('admin') }}" class="{% if request.endpoint == 'admin' %}active{% endif %}"><i class="fa-solid fa-shield-halved"></i> Admin Control</a></li>
                <li><a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}"><i class="fa-solid fa-circle-info"></i> Intel Brief</a></li>
            </ul>
            
            <div class="sidebar-footer">
                <div class="theme-toggle" id="theme-toggle">
                    <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Navbar -->
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Global search index...">
                </div>
                <div class="topbar-actions">
                    <div class="notification-icon">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge pulse">3</span>
                    </div>
                    <div class="user-profile">
                        <div class="status-indicator online"></div>
                        <span class="user-role">SYSTEM_ADMIN</span>
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Avatar" class="avatar">
                    </div>
                </div>
            </header>

            <!-- Dynamic Content -->
            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='charts.js') }}"></script>
</body>
</html>
